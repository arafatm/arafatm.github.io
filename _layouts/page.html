---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
    {% if page.author %} by {{ page.author }}<br />{% endif %}
    {% if page.source %} 
    source: <a href="{{ page.source }}">{{ page.source }}</a> 
    {% endif %}
  </header>
  {% comment %}
  {% endcomment %}
  <div class="post-content">
    {{ content }}
  </div>
</article>
