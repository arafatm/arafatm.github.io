---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
    {% if page.author %} by {{ page.author }} {% endif %}
    <a href="{{ page.source }}">{{ page.source }}</a> 
  </header>
  {% comment %}
  {% endcomment %}
  <div class="post-content">
    {{ content }}
  </div>
</article>
