---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
    {% if page.author %} 
    <div>By: <strong>{{ page.author }}</strong></div>
    {% endif %}
    {% if page.source %} 
    <div>Source: <a href="{{ page.source }}">{{ page.source }}</a></div>
    {% endif %}
    {% if page.tags %}
    <div>
      Tags: 
      {% for tag in page.tags %}
      <strong>{{ tag }}&nbsp;</strong>
      {% endfor %}
    </div>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
